<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Finance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0f1e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
        header { background: #111827; padding: 0.8rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1e3a5f; }
        header h1 { color: #00d4ff; font-size: 1.3rem; }
        header span { color: #64748b; font-size: 0.8rem; }
        .agents { display: flex; gap: 0.8rem; padding: 0.5rem 2rem; background: #0d1524; border-bottom: 1px solid #1e3a5f; }
        .agent-badge { background: #1e3a5f; color: #00d4ff; padding: 0.25rem 0.7rem; border-radius: 20px; font-size: 0.72rem; }
        #chat { flex: 1; overflow-y: auto; padding: 1rem 2rem; display: flex; flex-direction: column; gap: 0.8rem; }
        .msg { max-width: 85%; padding: 0.9rem 1.1rem; border-radius: 10px; line-height: 1.5; font-size: 0.9rem; }
        .msg.user { background: #1e3a5f; align-self: flex-end; color: #e0e0e0; }
        .msg.bot { background: #111827; align-self: flex-start; border: 1px solid #1e3a5f; width: 85%; }
        .msg.bot h2 { color: #00d4ff; font-size: 1rem; margin: 0.6rem 0 0.3rem; border-bottom: 1px solid #1e3a5f; padding-bottom: 0.3rem; }
        .msg.bot h3 { color: #00d4ff; font-size: 0.9rem; margin: 0.5rem 0 0.2rem; }
        .msg.bot h4 { color: #7dd3fc; font-size: 0.85rem; margin: 0.4rem 0 0.2rem; }
        .msg.bot p { margin: 0.2rem 0; }
        .msg.bot strong { color: #7dd3fc; }
        .msg.bot ul, .msg.bot ol { margin: 0.2rem 0 0.2rem 1.2rem; }
        .msg.bot li { margin: 0.1rem 0; }
        .msg.bot hr { border: none; border-top: 1px solid #1e3a5f; margin: 0.4rem 0; }
        .msg.bot blockquote { border-left: 3px solid #00d4ff; padding-left: 0.7rem; color: #94a3b8; margin: 0.3rem 0; font-size: 0.85rem; }
        .msg.bot pre { background: #0d1524; border: 1px solid #1e3a5f; border-radius: 6px; padding: 0.6rem; font-size: 0.8rem; overflow-x: auto; margin: 0.3rem 0; white-space: pre-wrap; }
        table { width: 100%; border-collapse: collapse; margin: 0.3rem 0; font-size: 0.82rem; }
        th { background: #1e3a5f; color: #00d4ff; padding: 0.4rem 0.6rem; text-align: left; }
        td { padding: 0.35rem 0.6rem; border-bottom: 1px solid #1a2535; }
        tr:hover td { background: #1a2535; }
        footer { padding: 0.8rem 2rem; background: #111827; border-top: 1px solid #1e3a5f; display: flex; gap: 0.8rem; }
        #input { flex: 1; background: #1a2535; border: 1px solid #1e3a5f; color: #e0e0e0; padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.9rem; outline: none; }
        #input:focus { border-color: #00d4ff; }
        #send { background: #00d4ff; color: #0a0f1e; border: none; padding: 0.7rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        #send:hover { background: #00b8d9; }
        #reset { background: transparent; color: #64748b; border: 1px solid #1e3a5f; padding: 0.7rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        #reset:hover { color: #e0e0e0; border-color: #e0e0e0; }
        .typing { color: #64748b; font-style: italic; font-size: 0.85rem; }
    </style>
</head>
<body>
    <header>
        <h1>&#127970; Quantum Finance</h1>
        <span>Sistema Multiagente de Consultoria Financeira</span>
    </header>
    <div class="agents">
        <span class="agent-badge">&#127919; Lead Advisor</span>
        <span class="agent-badge">&#128200; Market Analyst</span>
        <span class="agent-badge">&#128201; B3 Agent</span>
    </div>
    <div id="chat">
        <div class="msg bot">
            Bem-vindo a <strong>Quantum Finance</strong>! Digite <strong>ola</strong> para comecar sua consultoria personalizada.
        </div>
    </div>
    <footer>
        <input id="input" type="text" placeholder="Digite sua mensagem...">
        <button id="send">Enviar</button>
        <button id="reset">Nova Sessao</button>
    </footer>
    <script>
        var chat = document.getElementById('chat');
        var input = document.getElementById('input');

        function parseMarkdown(text) {
            var lines = text.split('\n');
            var html = '';
            var inTable = false;
            var inPre = false;
            var tableRows = [];

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];

                if (line.startsWith('```')) {
                    if (!inPre) { html += '<pre>'; inPre = true; }
                    else { html += '</pre>'; inPre = false; }
                    continue;
                }
                if (inPre) { html += line + '\n'; continue; }

                if (line.match(/^\|(.+)\|$/)) {
                    if (!inTable) { inTable = true; tableRows = []; }
                    if (!line.match(/^\|[-| ]+\|$/)) tableRows.push(line);
                    continue;
                } else if (inTable) {
                    html += renderTable(tableRows);
                    inTable = false; tableRows = [];
                }

                if (line.startsWith('# ')) { html += '<h2>' + fmt(line.slice(2)) + '</h2>'; continue; }
                if (line.startsWith('## ')) { html += '<h3>' + fmt(line.slice(3)) + '</h3>'; continue; }
                if (line.startsWith('### ')) { html += '<h4>' + fmt(line.slice(4)) + '</h4>'; continue; }
                if (line.startsWith('---')) { html += '<hr>'; continue; }
                if (line.startsWith('> ')) { html += '<blockquote>' + fmt(line.slice(2)) + '</blockquote>'; continue; }
                if (line.startsWith('- ') || line.startsWith('* ')) { html += '<li>' + fmt(line.slice(2)) + '</li>'; continue; }
                if (line.match(/^\d+\. /)) { html += '<li>' + fmt(line.replace(/^\d+\. /, '')) + '</li>'; continue; }
                if (line.trim() === '') { html += '<br>'; continue; }
                html += '<p>' + fmt(line) + '</p>';
            }

            if (inTable) html += renderTable(tableRows);
            if (inPre) html += '</pre>';
            return html;
        }

        function renderTable(rows) {
            if (rows.length === 0) return '';
            var html = '<table>';
            rows.forEach(function(row, idx) {
                var cells = row.split('|').filter(function(c) { return c.trim() !== ''; });
                html += idx === 0 ? '<tr>' : '<tr>';
                cells.forEach(function(cell) {
                    html += idx === 0 ? '<th>' + fmt(cell.trim()) + '</th>' : '<td>' + fmt(cell.trim()) + '</td>';
                });
                html += '</tr>';
            });
            return html + '</table>';
        }

        function fmt(text) {
            return text
                .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code style="background:#0d1524;padding:0 3px;border-radius:3px;">$1</code>');
        }

        function addMsg(text, type) {
            var div = document.createElement('div');
            div.className = 'msg ' + type;
            if (type === 'bot') {
                div.innerHTML = parseMarkdown(text);
            } else {
                div.textContent = text;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function sendMsg() {
            var msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            addMsg(msg, 'user');
            var typing = addMsg('Analisando...', 'bot typing');
            fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                typing.remove();
                addMsg(data.response, 'bot');
            })
            .catch(function() {
                typing.remove();
                addMsg('Erro ao processar. Tente novamente.', 'bot');
            });
        }

        document.getElementById('send').addEventListener('click', sendMsg);
        input.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMsg(); });
        document.getElementById('reset').addEventListener('click', function() {
            fetch('/reset', {method: 'POST'}).then(function() {
                chat.innerHTML = '<div class="msg bot">Nova sessao iniciada!</div>';
            });
        });
    </script>
</body>
</html>
